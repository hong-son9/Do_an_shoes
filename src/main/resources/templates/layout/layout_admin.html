    <th:block th:replace="${cssResources} ?: ~{}"></th:block>

    <!-- ====== Modern admin theme override ====== -->
    <style>
        :root {
            --adm-primary: #ff6b35;
            --adm-primary-dark: #e63946;
            --adm-navy: #0d1b2a;
            --adm-navy-2: #1a2944;
            --adm-bg: #f4f6fb;
            --adm-card: #ffffff;
            --adm-text: #1f2a37;
            --adm-text-2: #6b7280;
            --adm-border: #e5e7eb;
            --adm-success: #22c55e;
            --adm-warning: #ffa726;
            --adm-danger: #ef4444;
        }

        html, body { background: var(--adm-bg) !important; }
        body { color: var(--adm-text) !important; font-size: 14px; }

        /* ===== HEADER ===== */
        header.header {
            background: linear-gradient(135deg, #0d1b2a 0%, #1a2944 100%) !important;
            box-shadow: 0 4px 16px rgba(13,27,42,0.25) !important;
            border-bottom: 0 !important;
        }
        header.header::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--adm-primary), #ffd60a, var(--adm-primary));
        }
        header.header .logo-container {
            background: rgba(255,255,255,0.05) !important;
            border-right: 1px solid rgba(255,255,255,0.08) !important;
        }
        header.header .logo img {
            border-radius: 8px;
            background: #fff;
            padding: 4px;
        }
        header.header .header-right { padding-right: 20px; }
        /* Userbox trigger — căn giữa avatar + tên + caret */
        header.header #userbox {
            padding: 6px 12px;
        }
        header.header #userbox > a {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            text-decoration: none !important;
            padding: 4px 10px !important;
            border-radius: 12px !important;
            transition: background 0.2s ease;
        }
        header.header #userbox > a:hover {
            background: rgba(255,255,255,0.06) !important;
        }
        header.header #userbox .profile-picture {
            margin: 0 !important;
            flex-shrink: 0;
            position: relative !important;
            z-index: 1;
        }
        header.header #userbox .profile-picture img {
            width: 40px !important;
            height: 40px !important;
            border-radius: 50% !important;
            border: 2px solid var(--adm-primary) !important;
            box-shadow: 0 4px 12px rgba(255,107,53,0.4);
            display: block;
        }
        header.header #userbox .profile-info {
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            line-height: 1.2 !important;
            margin: 0 !important;
            padding: 0 !important;
            min-width: 0;
        }
        header.header #userbox .profile-info .name {
            color: #fff !important;
            font-weight: 700 !important;
            font-size: 0.95rem !important;
            margin: 0 !important;
            padding: 0 !important;
            line-height: 1.25 !important;
        }
        header.header #userbox .profile-info .role {
            color: var(--adm-primary) !important;
            font-size: 0.78rem !important;
            font-weight: 600;
            margin: 2px 0 0 !important;
            padding: 0 !important;
            line-height: 1.2 !important;
        }
        header.header #userbox .custom-caret {
            color: #fff !important;
            margin-left: 4px;
            font-size: 0.85rem;
            opacity: 0.7;
        }
        header.header #userbox.show .custom-caret { transform: rotate(180deg); opacity: 1; }

        /* Dropdown menu */
        header.header #userbox .dropdown-menu {
            border: 0 !important;
            border-radius: 12px !important;
            box-shadow: 0 16px 40px rgba(0,0,0,0.2) !important;
            padding: 8px !important;
            margin-top: 12px !important;
            min-width: 240px !important;
            right: 0 !important;
            left: auto !important;
            transform: none !important;
            background: #fff !important;
        }
        header.header #userbox .dropdown-menu::before {
            content: "";
            position: absolute;
            top: -6px;
            right: 24px;
            width: 12px;
            height: 12px;
            background: #fff;
            transform: rotate(45deg);
            box-shadow: -2px -2px 4px rgba(0,0,0,0.04);
        }
        header.header #userbox .dropdown-menu ul.list-unstyled {
            margin: 0 !important;
            padding: 0 !important;
            list-style: none !important;
            position: relative;
            z-index: 1;
        }
        header.header #userbox .dropdown-menu li {
            list-style: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }
        header.header #userbox .dropdown-menu li a {
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            border-radius: 8px !important;
            padding: 11px 14px !important;
            font-weight: 600 !important;
            color: var(--adm-text) !important;
            font-size: 0.95rem !important;
            text-decoration: none !important;
            line-height: 1.3 !important;
            white-space: nowrap;
            transition: all 0.2s ease;
            background: transparent !important;
        }
        header.header #userbox .dropdown-menu li a i,
        header.header #userbox .dropdown-menu li a .bx {
            color: var(--adm-primary) !important;
            font-size: 1.15rem !important;
            margin: 0 !important;
            flex-shrink: 0;
            width: 20px;
            text-align: center;
        }
        header.header #userbox .dropdown-menu li a:hover {
            background: #fff5ed !important;
            color: var(--adm-primary) !important;
            transform: translateX(2px);
        }
        header.header #userbox .dropdown-menu .divider { display: none !important; }

        /* ===== SIDEBAR ===== */
        aside.sidebar-left {
            background: var(--adm-navy) !important;
            border-right: 0 !important;
            box-shadow: 4px 0 16px rgba(13,27,42,0.06) !important;
        }
        aside.sidebar-left .sidebar-header {
            background: linear-gradient(135deg, #0d1b2a 0%, #1a2944 100%) !important;
            border-bottom: 1px solid rgba(255,255,255,0.08) !important;
        }
        aside.sidebar-left .sidebar-toggle {
            color: #fff !important;
            background: rgba(255,107,53,0.15) !important;
            border-radius: 8px !important;
            transition: background 0.2s ease;
        }
        aside.sidebar-left .sidebar-toggle:hover {
            background: var(--adm-primary) !important;
        }
        aside.sidebar-left .nano-content { padding-top: 12px; }
        aside.sidebar-left .nav-main > li > a.nav-link {
            color: #cbd5e0 !important;
            font-weight: 600 !important;
            padding: 12px 18px !important;
            border-radius: 0 !important;
            transition: all 0.2s ease;
            position: relative;
            font-size: 0.95rem;
        }
        aside.sidebar-left .nav-main > li > a.nav-link i,
        aside.sidebar-left .nav-main > li > a.nav-link > .bx {
            color: var(--adm-primary) !important;
            font-size: 1.2rem !important;
            margin-right: 10px;
            transition: transform 0.2s ease;
        }
        aside.sidebar-left .nav-main > li > a.nav-link:hover {
            background: rgba(255,255,255,0.05) !important;
            color: #fff !important;
            padding-left: 22px !important;
        }
        aside.sidebar-left .nav-main > li > a.nav-link:hover > i,
        aside.sidebar-left .nav-main > li > a.nav-link:hover > .bx {
            transform: scale(1.1);
        }
        aside.sidebar-left .nav-main > li.nav-active > a.nav-link,
        aside.sidebar-left .nav-main > li.nav-expanded > a.nav-link {
            background: linear-gradient(90deg, rgba(255,107,53,0.18), transparent) !important;
            color: #fff !important;
            border-left: 3px solid var(--adm-primary) !important;
            padding-left: 15px !important;
        }
        aside.sidebar-left .nav-children {
            background: rgba(0,0,0,0.18) !important;
            padding: 6px 0 !important;
            margin: 0 !important;
        }
        aside.sidebar-left .nav-children li a.nav-link {
            color: #94a3b8 !important;
            padding: 9px 18px 9px 50px !important;
            font-size: 0.88rem !important;
            position: relative;
            transition: all 0.2s ease;
        }
        aside.sidebar-left .nav-children li a.nav-link::before {
            content: "";
            position: absolute;
            left: 30px; top: 50%;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #475569;
            transform: translateY(-50%);
            transition: background 0.2s ease, transform 0.2s ease;
        }
        aside.sidebar-left .nav-children li a.nav-link:hover {
            color: #fff !important;
            background: rgba(255,255,255,0.04) !important;
            padding-left: 56px !important;
        }
        aside.sidebar-left .nav-children li a.nav-link:hover::before {
            background: var(--adm-primary);
            transform: translateY(-50%) scale(1.3);
        }

        /* ===== INNER WRAPPER / CONTENT ===== */
        .inner-wrapper { background: var(--adm-bg) !important; }
        section.content-body {
            background: var(--adm-bg) !important;
            padding: 24px 28px !important;
        }
        .header-section .page-header,
        section .page-header,
        .page-header {
            background: var(--adm-card) !important;
            border-radius: 14px !important;
            padding: 22px 26px !important;
            margin-bottom: 22px !important;
            box-shadow: 0 4px 16px rgba(13,27,42,0.05);
            border: 0 !important;
        }
        .page-header h2, .page-header h1 {
            color: var(--adm-text) !important;
            font-weight: 800 !important;
            font-size: 1.5rem !important;
            margin: 0 0 4px !important;
            padding: 0 !important;
            position: relative;
            display: inline-block;
        }
        .page-header h2::after, .page-header h1::after {
            content: "";
            display: block;
            margin-top: 8px;
            width: 50px; height: 3px;
            background: linear-gradient(90deg, var(--adm-primary), #ffd60a);
            border-radius: 2px;
        }
        .page-header .breadcrumbs {
            background: transparent !important;
            padding: 0 !important;
            border: 0 !important;
            margin: 0 !important;
            font-size: 0.85rem !important;
        }
        .page-header .breadcrumbs a {
            color: var(--adm-primary) !important;
            font-weight: 600;
        }
        .page-header .breadcrumbs .active { color: var(--adm-text-2) !important; }

        /* ===== PANELS / CARDS ===== */
        section.panel {
            background: var(--adm-card) !important;
            border: 0 !important;
            border-radius: 14px !important;
            box-shadow: 0 4px 18px rgba(13,27,42,0.06) !important;
            margin-bottom: 22px !important;
            overflow: hidden;
        }
        section.panel .panel-heading {
            background: linear-gradient(135deg, #f7fafc, #eef2f7) !important;
            border-bottom: 1px solid var(--adm-border) !important;
            padding: 16px 22px !important;
        }
        section.panel .panel-title {
            color: var(--adm-text) !important;
            font-weight: 700 !important;
            font-size: 1.05rem !important;
            margin: 0 !important;
        }
        section.panel .panel-body {
            padding: 22px !important;
            background: #fff !important;
        }
        section.panel .panel-actions a {
            color: var(--adm-text-2) !important;
            transition: color 0.2s ease;
        }
        section.panel .panel-actions a:hover { color: var(--adm-primary) !important; }

        /* ===== TABLES ===== */
        table.table {
            margin: 0 !important;
            border-collapse: separate !important;
            border-spacing: 0 !important;
        }
        table.table thead th {
            background: linear-gradient(135deg, #0d1b2a, #1a2944) !important;
            color: #fff !important;
            font-weight: 700 !important;
            font-size: 0.82rem !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 16px !important;
            border: 0 !important;
            white-space: nowrap;
        }
        table.table thead th:first-child { border-top-left-radius: 8px; }
        table.table thead th:last-child { border-top-right-radius: 8px; }
        table.table tbody tr {
            transition: background 0.15s ease, transform 0.15s ease;
        }
        table.table tbody tr:hover {
            background: #fff5ed !important;
        }
        table.table tbody td {
            padding: 14px 16px !important;
            border-top: 1px solid #f3f4f6 !important;
            border-bottom: 0 !important;
            vertical-align: middle !important;
            color: var(--adm-text) !important;
            font-size: 0.92rem !important;
        }
        table.table tbody tr:first-child td { border-top: 0 !important; }
        table.table img { border-radius: 6px; }

        /* Action buttons inside tables */
        table.table .btn,
        table.table a.btn {
            padding: 6px 12px !important;
            font-size: 0.82rem !important;
            border-radius: 6px !important;
            font-weight: 600 !important;
            margin: 0 2px !important;
            line-height: 1.4 !important;
        }
        table.table .btn-primary {
            background: linear-gradient(135deg, #08c, #035983) !important;
            border-color: transparent !important;
            color: #fff !important;
        }
        table.table .btn-danger,
        table.table .btn-delete {
            background: linear-gradient(135deg, var(--adm-primary), var(--adm-primary-dark)) !important;
            border-color: transparent !important;
            color: #fff !important;
        }
        table.table .btn-warning,
        table.table .btn-edit {
            background: linear-gradient(135deg, #ffa726, #f57c00) !important;
            border-color: transparent !important;
            color: #fff !important;
        }
        table.table .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
            border-color: transparent !important;
            color: #fff !important;
        }
        table.table .btn:hover { transform: translateY(-1px); filter: brightness(1.08); }

        /* Status badges */
        .badge, .label {
            padding: 5px 10px !important;
            border-radius: 12px !important;
            font-size: 0.78rem !important;
            font-weight: 700 !important;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge-success { background: #dcfce7 !important; color: #166534 !important; }
        .badge-danger  { background: #fee2e2 !important; color: #991b1b !important; }
        .badge-warning { background: #fef3c7 !important; color: #92400e !important; }
        .badge-info    { background: #dbeafe !important; color: #1e3a8a !important; }

        /* ===== BUTTONS (general) ===== */
        .btn {
            border-radius: 10px !important;
            font-weight: 600 !important;
            padding: 9px 18px !important;
            font-size: 0.92rem !important;
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
            border: 0 !important;
            text-transform: none !important;
            letter-spacing: 0;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-primary {
            background: linear-gradient(135deg, var(--adm-primary), var(--adm-primary-dark)) !important;
            color: #fff !important;
            box-shadow: 0 6px 16px rgba(255,107,53,0.3);
        }
        .btn-primary:hover { box-shadow: 0 10px 24px rgba(255,107,53,0.45); }
        .btn-secondary, .btn-default {
            background: #f3f4f6 !important;
            color: var(--adm-text) !important;
            border: 1px solid var(--adm-border) !important;
        }
        .btn-secondary:hover, .btn-default:hover { background: #e5e7eb !important; }
        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a) !important;
            color: #fff !important;
            box-shadow: 0 6px 16px rgba(34,197,94,0.28);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            color: #fff !important;
            box-shadow: 0 6px 16px rgba(239,68,68,0.28);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ffa726, #f57c00) !important;
            color: #fff !important;
            box-shadow: 0 6px 16px rgba(255,167,38,0.28);
        }
        .btn-info {
            background: linear-gradient(135deg, #08c, #035983) !important;
            color: #fff !important;
            box-shadow: 0 6px 16px rgba(8,136,204,0.28);
        }

        /* ===== FORMS ===== */
        .form-control, .form-control:focus {
            border: 1.5px solid var(--adm-border) !important;
            border-radius: 10px !important;
            padding: 10px 14px !important;
            font-size: 0.95rem !important;
            height: auto !important;
            background: #fff !important;
            color: var(--adm-text) !important;
            box-shadow: none !important;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-control:focus {
            border-color: var(--adm-primary) !important;
            box-shadow: 0 0 0 4px rgba(255,107,53,0.12) !important;
            outline: 0 !important;
        }
        label {
            font-weight: 600 !important;
            color: var(--adm-text) !important;
            font-size: 0.92rem !important;
            margin-bottom: 6px !important;
        }
        .form-group { margin-bottom: 16px; }
        select.form-control { background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; background-size: 14px; padding-right: 36px !important; appearance: none; -webkit-appearance: none; }

        /* ===== PAGINATION ===== */
        .pagination .page-item .page-link,
        ul.pagination li a,
        ul.pagination li.active a {
            border-radius: 8px !important;
            margin: 0 3px;
            padding: 8px 14px !important;
            color: var(--adm-text) !important;
            background: #fff !important;
            border: 1px solid var(--adm-border) !important;
            font-weight: 600 !important;
            font-size: 0.92rem !important;
            transition: all 0.2s ease;
        }
        .pagination .page-item.active .page-link,
        ul.pagination li.active a {
            background: linear-gradient(135deg, var(--adm-primary), var(--adm-primary-dark)) !important;
            color: #fff !important;
            border-color: transparent !important;
            box-shadow: 0 4px 12px rgba(255,107,53,0.35);
        }
        ul.pagination li a:hover {
            background: #fff5ed !important;
            color: var(--adm-primary) !important;
            border-color: var(--adm-primary) !important;
        }

        /* ===== MODAL ===== */
        .modal-content {
            border: 0 !important;
            border-radius: 14px !important;
            box-shadow: 0 24px 70px rgba(13,27,42,0.25) !important;
            overflow: hidden;
        }
        .modal-header {
            background: linear-gradient(135deg, #0d1b2a, #1a2944) !important;
            color: #fff !important;
            padding: 18px 24px !important;
            border-bottom: 0 !important;
        }
        .modal-header .modal-title {
            color: #fff !important;
            font-weight: 700 !important;
            font-size: 1.15rem !important;
        }
        .modal-header .close { color: #fff !important; opacity: 0.85 !important; text-shadow: none !important; }
        .modal-header .close:hover { color: var(--adm-primary) !important; opacity: 1 !important; }
        .modal-body { padding: 22px 24px !important; }
        .modal-footer { padding: 14px 24px !important; border-top: 1px solid var(--adm-border) !important; }

        /* ===== DASHBOARD CARDS (Porto Admin info-tiles / counters) ===== */
        .summary {
            background: var(--adm-card) !important;
            border-radius: 14px !important;
            border: 0 !important;
            box-shadow: 0 4px 18px rgba(13,27,42,0.06) !important;
            padding: 22px !important;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .summary:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(13,27,42,0.1) !important; }
        .summary h4 {
            color: var(--adm-text-2) !important;
            font-size: 0.85rem !important;

<!-- Mobile hamburger toggle button (auto-hide on desktop via CSS) -->
<button id="adm-mobile-toggle" type="button" aria-label="Mở menu" style="display:none;">
    <i class="fas fa-bars"></i>
</button>

<script>
    (function() {
        var body = document.body;
        var toggle = document.getElementById('adm-mobile-toggle');
        if (!toggle) return;

        function openSidebar() { body.classList.add('adm-sidebar-open'); }
        function closeSidebar() { body.classList.remove('adm-sidebar-open'); }

        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            // Delay 1 frame để event không bubble ngay xuống document handler
            setTimeout(openSidebar, 0);
        });

        // Click anywhere outside sidebar+toggle closes sidebar
        document.addEventListener('click', function(e) {
            if (!body.classList.contains('adm-sidebar-open')) return;
            var sidebar = document.querySelector('aside.sidebar-left');
            // KIỂM TRA cả descendant (icon <i> bên trong button toggle) để không nhầm
            var clickedToggle = toggle.contains(e.target) || e.target === toggle;
            var clickedSidebar = sidebar && sidebar.contains(e.target);
            if (!clickedToggle && !clickedSidebar) {
                closeSidebar();
            }
        });

        // Click a nav link inside sidebar → close (better UX on mobile)
        var navLinks = document.querySelectorAll('aside.sidebar-left .nav-link');
        for (var i = 0; i < navLinks.length; i++) {
            navLinks[i].addEventListener('click', function(e) {
                var href = this.getAttribute('href');
                // Only close if link navigates (not collapse toggle)
                if (href && href !== '#' && !this.closest('.nav-parent')) {
                    setTimeout(closeSidebar, 100);
                }
            });
        }

        // ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSidebar();
        });

        // Close on resize to desktop
        var resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                if (window.innerWidth > 768) closeSidebar();
            }, 150);
        });
    })();
</script>
