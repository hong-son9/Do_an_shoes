<!-- Modal -->
<th:block th:fragment="login_modal">
<style>
    /* ===== Login/Register modal — modern ===== */
    #exampleModal .modal-dialog,
    #exampleModalRegister .modal-dialog {
        max-width: 440px !important;
    }
    #exampleModal .modal-content,
    #exampleModalRegister .modal-content {
        border: 0 !important;
        border-radius: 18px !important;
        overflow: hidden;
        box-shadow: 0 24px 70px rgba(13, 27, 42, 0.35);
    }
    #exampleModal .modal-header,
    #exampleModalRegister .modal-header {
        background: linear-gradient(135deg, #0d1b2a 0%, #1a2944 100%);
        color: #fff !important;
        padding: 26px 28px 22px !important;
        border-bottom: 0 !important;
        position: relative;
        overflow: hidden;
    }
    #exampleModal .modal-header::before,
    #exampleModalRegister .modal-header::before {
        content: "";
        position: absolute;
        top: 0; right: 0;
        width: 180px; height: 180px;
        background: radial-gradient(circle, rgba(255, 107, 53, 0.25), transparent 70%);
        pointer-events: none;
    }
    #exampleModal .modal-title,
    #exampleModalRegister .modal-title {
        color: #fff !important;
        font-size: 1.6rem !important;
        font-weight: 800 !important;
        letter-spacing: 0.5px;
        position: relative;
        z-index: 1;
        margin: 0;
    }
    #exampleModal .modal-header::after,
    #exampleModalRegister .modal-header::after {
        content: "";
        position: absolute;
        left: 28px; bottom: 12px;
        width: 50px; height: 3px;
        background: linear-gradient(90deg, #ff6b35, #ffd60a);
        border-radius: 2px;
    }
    #exampleModal .modal-header .close,
    #exampleModalRegister .modal-header .close {
        color: #fff !important;
        opacity: 0.85;
        text-shadow: none !important;
        font-size: 1.8rem !important;
        font-weight: 400 !important;
        margin: 0 !important;
        padding: 0 !important;
        position: absolute;
        top: 14px; right: 20px;
        z-index: 2;
    }
    #exampleModal .modal-header .close:hover,
    #exampleModalRegister .modal-header .close:hover {
        color: #ff6b35 !important;
        opacity: 1;
    }
    #exampleModal .modal-body,
    #exampleModalRegister .modal-body {
        padding: 28px !important;
        background: #fff;
    }
    #exampleModal label,
    #exampleModalRegister label {
        font-weight: 600 !important;
        font-size: 0.95rem !important;
        color: #0d1b2a !important;
        margin-bottom: 6px !important;
        display: block;
    }
    #exampleModal label .required,
    #exampleModalRegister label .required {
        color: #ff6b35;
        font-weight: 700;
    }

    /* Input with icon */
    #exampleModal .modal-body .input-wrap,
    #exampleModalRegister .modal-body .input-wrap {
        position: relative;
        margin-bottom: 14px;
    }
    #exampleModal .modal-body .input-wrap::before,
    #exampleModalRegister .modal-body .input-wrap::before {
        font-family: "Font Awesome 5 Free", "Font Awesome 6 Free", "FontAwesome";
        font-weight: 900;
        position: absolute;
        left: 16px; top: 50%;
        transform: translateY(-50%);
        color: #9ca3af;
        font-size: 0.95rem;
        pointer-events: none;
        transition: color 0.2s ease;
    }
    #exampleModal .modal-body .input-wrap.icon-email::before,
    #exampleModalRegister .modal-body .input-wrap.icon-email::before { content: "\f0e0"; }
    #exampleModal .modal-body .input-wrap.icon-lock::before,
    #exampleModalRegister .modal-body .input-wrap.icon-lock::before { content: "\f023"; }
    #exampleModalRegister .modal-body .input-wrap.icon-user::before { content: "\f007"; }
    #exampleModalRegister .modal-body .input-wrap.icon-phone::before { content: "\f095"; }

    #exampleModal .form-input,
    #exampleModalRegister .form-input {
        width: 100% !important;
        border: 1.5px solid #e5e7eb !important;
        border-radius: 10px !important;
        padding: 12px 16px 12px 44px !important;
        font-size: 1rem !important;
        background: #f9fafb !important;
        color: #0d1b2a !important;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        height: auto !important;
    }
    #exampleModal .form-input:focus,
    #exampleModalRegister .form-input:focus {
        border-color: #ff6b35 !important;
        background: #fff !important;
        box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.12) !important;
        outline: none !important;
    }
    #exampleModal .input-wrap:focus-within::before,
    #exampleModalRegister .input-wrap:focus-within::before {
        color: #ff6b35;
    }

    /* Hide the redundant <br> spacers */
    #exampleModal .modal-body br,
    #exampleModalRegister .modal-body br {
        display: none;
    }

    /* Form footer & buttons */
    #exampleModal .form-footer,
    #exampleModalRegister .form-footer {
        display: flex;
        gap: 10px;
        margin-top: 18px;
        flex-direction: column;
    }
    #exampleModal .form-footer .btn,
    #exampleModalRegister .form-footer .btn {
        width: 100%;
        padding: 13px 20px !important;
        font-weight: 700 !important;
        font-size: 1rem !important;
        border-radius: 10px !important;
        border: 0 !important;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    #exampleModal .form-footer .btn-primary,
    #exampleModalRegister .form-footer .btn-primary {
        background: linear-gradient(135deg, #ff6b35, #e63946) !important;
        color: #fff !important;
        box-shadow: 0 8px 20px rgba(255, 107, 53, 0.35);
    }
    #exampleModal .form-footer .btn-primary:hover,
    #exampleModalRegister .form-footer .btn-primary:hover {
        background: linear-gradient(135deg, #e63946, #c1121f) !important;
        transform: translateY(-2px);
        box-shadow: 0 12px 26px rgba(255, 107, 53, 0.5);
    }
    #exampleModal .form-footer .btn-secondary,
    #exampleModalRegister .form-footer .btn-secondary {
        background: transparent !important;
        color: #0d1b2a !important;
        border: 1.5px solid #e5e7eb !important;
    }
    #exampleModal .form-footer .btn-secondary:hover,
    #exampleModalRegister .form-footer .btn-secondary:hover {
        border-color: #ff6b35 !important;
        color: #ff6b35 !important;
        background: #fff5ed !important;
    }

    /* Footer hint */
    .auth-footer-hint {
        text-align: center;
        margin-top: 16px;
        font-size: 0.92rem;
        color: #6b7280;
    }
    .auth-footer-hint a {
        color: #ff6b35;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
    }
    .auth-footer-hint a:hover { text-decoration: underline; }

    /* Validation feedback nicer */
    #exampleModal label.error,
    #exampleModalRegister label.error {
        color: #e63946 !important;
        font-size: 0.85rem !important;
        margin-top: -8px;
        margin-bottom: 8px;
        font-weight: 500 !important;
        display: block;
    }
</style>

<div class="modal fade " id="exampleModal" tabindex="-1" role="dialog"
     aria-labelledby="exampleModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Đăng nhập</h3>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row row-sparse">
                    <div class="col-md-12">
                        <form class="mb-1" id="loginForm">
                            <label for="login_email">Email <span class="required">*</span></label>
                            <div class="input-wrap icon-email">
                                <input type="email" class="form-input form-wide mb-2" name="login_email" id="login_email" placeholder="your@email.com">
                            </div>
                            <label for="login_password">Mật khẩu <span class="required">*</span></label>
                            <div class="input-wrap icon-lock">
                                <input type="password" class="form-input form-wide mb-2" name="login_password"
                                       id="login_password" placeholder="Nhập mật khẩu">
                            </div>
                            <div class="form-footer">
                                <button type="submit" class="btn btn-primary btn-md">Đăng nhập</button>
                                <button  data-toggle="modal" href="#exampleModalRegister" data-dismiss="modal" class="btn btn-secondary btn-md">Đăng ký</button>
                            </div><!-- End .form-footer -->
                            <div class="auth-footer-hint">
                                Chưa có tài khoản? <a data-toggle="modal" href="#exampleModalRegister" data-dismiss="modal">Đăng ký ngay</a>
                            </div>
                        </form>
<!--                        <div class="btn-group">-->
<!--                            <a class="btn btn-social-login btn-md btn-gplus mb-1"><i-->
<!--                                    class="fab fa-google pt-1"></i><span>Google</span></a>-->
<!--                            <a class="btn btn-social-login btn-md btn-facebook mb-1"><i class="icon-facebook"></i><span>Facebook</span></a>-->
<!--                        </div>-->
                    </div><!-- End .col-md-6 -->
                </div><!-- End .row -->
            </div>
        </div>
    </div>
</div>

<div class="modal fade " id="exampleModalRegister" tabindex="-1" role="dialog"
     aria-labelledby="exampleModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Đăng ký tài khoản</h3>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="row row-sparse">
                    <div class="col-md-12">
                        <form action="#" id="registerForm">
                            <label for="register_full_name">Họ và tên <span class="required">*</span></label>
                            <div class="input-wrap icon-user">
                                <input type="text" class="form-input form-wide mb-2" name="register_full_name" id="register_full_name" placeholder="Nguyễn Văn A">
                            </div>
                            <label for="register_phone">Số điện thoại <span class="required">*</span></label>
                            <div class="input-wrap icon-phone">
                                <input type="text" class="form-input form-wide mb-2" name="register_phone" id="register_phone" placeholder="0xxx xxx xxx">
                            </div>
                            <label for="register_email">Email <span class="required">*</span></label>
                            <div class="input-wrap icon-email">
                                <input type="email" class="form-input form-wide mb-2" name="register_email" id="register_email" placeholder="your@email.com">
                            </div>
                            <label for="register_password">Mật khẩu <span class="required">*</span></label>
                            <div class="input-wrap icon-lock">
                                <input type="password" class="form-input form-wide mb-2" name="register_password" id="register_password" placeholder="Tối thiểu 6 ký tự">
                            </div>
                            <label for="register_confirm_password">Nhập lại mật khẩu <span class="required">*</span></label>
                            <div class="input-wrap icon-lock">
                                <input type="password" class="form-input form-wide mb-2" name="register_confirm_password" id="register_confirm_password" placeholder="Xác nhận mật khẩu">
                            </div>

                            <div class="form-footer">
                                <button type="submit" class="btn btn-primary btn-md">Đăng ký</button>
                                <button  data-toggle="modal" href="#exampleModal" data-dismiss="modal" class="btn btn-secondary btn-md">Quay lại</button>
                            </div><!-- End .form-footer -->
                            <div class="auth-footer-hint">
                                Đã có tài khoản? <a data-toggle="modal" href="#exampleModal" data-dismiss="modal">Đăng nhập</a>
                            </div>
                        </form>
                    </div><!-- End .col-md-6 -->
                </div><!-- End .row -->
            </div>
        </div>
    </div>
</div>

</th:block>
