<th:block th:fragment="header">
    <header class="header">
        <div class="header-middle">
            <div class="container">
                <div class="header-left col-lg-2 w-auto pl-0">
                    <button class="mobile-menu-toggler text-primary mr-2" type="button">
                        <i class="icon-menu"></i>
                    </button>
                    <a href="/" class="logo">
                        <img th:src="@{/shop/images/slider/logo2.jpg}"  alt="logo">
                    </a>
                </div><!-- End .header-left -->

                <div class="header-right w-lg-max" style="margin-bottom: 45px;">
                    <div class="header-icon header-icon header-search header-search-inline header-search-category w-lg-max text-right">
                        <a href="#" class="search-toggle search-button" role="button"><i class="icon-search-3"></i></a>
                        <style>.header-search-wrapper {
                            display: flex;
                            flex-direction: column;
                            align-items: flex-start;
                        }
                        .header-links a:after {
                            content: "|";
                            margin-left: 50px;
                        }
                        .header-links a:last-child:after {
                            content: "";
                        }
                        .header-links i {
                            margin-left: 5px;
                        }
                        .search-input-group {
                            display: flex;
                            align-items: center;
                        }


                        </style>
                        <div class="header-search-wrapper">
                            <div class="header-links" style="margin-bottom: 7px; font-weight: bold; color: black; ">
                                <a  href="#" style="margin-right: 60px;">Kênh Người Bán</a>
                                <a href="#" style="margin-right: 60px;">Tải ứng dụng</a>
                                <a href="#" style="margin-right: 60px;">Kết nối
                                    <i class="fab fa-facebook"></i>
                                    <i class="fab fa-instagram"></i>
                                    <i class="fab fa-twitter"></i>

                                </a>
                            </div>
                            <div class="search-input-group">
                                <input  class="form-control search-input" style="width: 600px;" placeholder="Nhập sản phẩm cần tìm kiếm..." required>
                                <button style="height: 40px;" class="btn icon-search-3 p-0 search-button" type="submit"></button>
                            </div>
                            <style>.horizontal-list {
                                list-style-type: none;
                                margin-top: 12px;
                                padding: 0;
                                display: flex; /* Sử dụng flexbox để xếp các mục theo chiều ngang */
                                flex-wrap: wrap; /* Cho phép các mục xuống dòng nếu không đủ không gian */
                            }

                            .horizontal-list li {
                                margin-right: 50px; /* Để lại khoảng trống giữa các mục */
                            }
                            </style>
                            <ul class="horizontal-list">
                                <li style="margin-left: 50px;">Van</li>
                                <li>Nike</li>
                                <li>Adidas</li>
                                <li>Puma</li>
                                <li>Converse</li>
                                <li>Balenciaga</li>
                            </ul>
                        </div><!-- End .header-search-wrapper -->
                    </div><!-- End .header-search -->

                    <div class="header-contact d-none d-lg-flex pl-4 ml-3 mr-xl-5 pr-4">
                        <img alt="phone" th:src="@{/shop/images/icon-phone.png}" width="30" height="30" class="pb-1">
                        <h6>Hotline<a href="tel:#" class="text-dark font1">036 545 4643</a></h6>
                    </div>

                    <a href="/gio-hang" class="header-icon" title="Giỏ hàng" style="position: relative; margin-right: 10px;">
                        <i class="icon-shopping-cart"></i>
                        <span id="cart-badge" style="position:absolute; top:-6px; right:-8px; background:#f04e40; color:#fff; border-radius:50%; padding:1px 6px; font-size:11px; display:none;">0</span>
                    </a>

                    <a href="" data-toggle="modal" data-target="#exampleModal" class="header-icon account-setting"><i class="icon-user-2"></i></a>

                </div><!-- End .header-right -->
            </div><!-- End .container -->
        </div><!-- End .header-middle -->

        <style>
            /* ===== Header — sport sneaker shop palette ===== */
            .header { background: #fff; box-shadow: 0 2px 12px rgba(13,27,42,0.05); }
            .header-middle { padding: 8px 0; }

            /* Top links */
            .header-links a {
                color: #0d1b2a !important;
                font-weight: 600;
                transition: color 0.2s ease;
            }
            .header-links a:hover { color: #ff6b35 !important; }
            .header-links i { color: #ff6b35; }

            /* Search bar */
            .search-input-group {
                border: 2px solid #eef1f5 !important;
                border-radius: 30px !important;
                overflow: hidden;
                padding: 0 !important;
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
            }
            .search-input-group:focus-within {
                border-color: #ff6b35 !important;
                box-shadow: 0 0 0 4px rgba(255,107,53,0.12);
            }
            .search-input-group .search-input {
                border: 0 !important;
                background: transparent !important;
                padding: 10px 18px !important;
                font-size: 1rem !important;
                height: auto !important;
            }
            .search-input-group .search-button {
                background: linear-gradient(135deg, #ff6b35, #e63946) !important;
                color: #fff !important;
                border-radius: 0 !important;
                padding: 0 22px !important;
                font-size: 1.1rem !important;
                transition: filter 0.2s ease;
            }
            .search-input-group .search-button:hover { filter: brightness(1.1); }

            /* Brand pill list */
            .horizontal-list {
                gap: 8px;
                margin-top: 14px !important;
            }
            .horizontal-list li {
                margin-right: 0 !important;
                margin-left: 0 !important;
                background: #f7fafc;
                padding: 6px 16px;
                border-radius: 20px;
                font-size: 0.92rem;
                font-weight: 600;
                color: #0d1b2a;
                cursor: pointer;
                transition: all 0.2s ease;
                border: 1.5px solid transparent;
            }
            .horizontal-list li:first-child { margin-left: 0 !important; }
            .horizontal-list li:hover {
                background: #fff;
                border-color: #ff6b35;
                color: #ff6b35;
                transform: translateY(-2px);
            }

            /* Hotline section */
            .header-contact { align-items: center; }
            .header-contact h6 {
                color: #6b7280 !important;
                font-size: 0.78rem !important;
                text-transform: uppercase;
                letter-spacing: 1px;
                margin: 0;
                line-height: 1.2;
            }
            .header-contact h6 a {
                display: block;
                color: #ff6b35 !important;
                font-size: 1.15rem !important;
                font-weight: 800 !important;
                margin-top: 2px;
            }

            /* Cart & account icons */
            .header-icon i {
                font-size: 1.4rem !important;
                color: #0d1b2a !important;
                transition: color 0.2s ease;
            }
            .header-icon:hover i { color: #ff6b35 !important; }
            #cart-badge {
                background: linear-gradient(135deg, #ff6b35, #e63946) !important;
                font-weight: 700;
                box-shadow: 0 3px 10px rgba(255,107,53,0.45);
            }

            /* Main nav (bottom) */
            .header-bottom { background: #fff; border-top: 1px solid #eef1f5; }
            .header-bottom .main-nav .menu > li > a {
                position: relative;
                transition: color 0.25s ease;
                padding-bottom: 8px;
                color: #0d1b2a !important;
                font-weight: 700;
                letter-spacing: 0.5px;
                text-transform: uppercase;
            }
            .header-bottom .main-nav .menu > li > a::after {
                content: "";
                position: absolute;
                left: 50%;
                bottom: 0;
                width: 0;
                height: 3px;
                background: linear-gradient(90deg, #ff6b35, #ffd60a);
                border-radius: 2px;
                transition: width 0.3s ease, left 0.3s ease;
            }
            .header-bottom .main-nav .menu > li:hover > a::after,
            .header-bottom .main-nav .menu > li.active > a::after {
                width: 100%;
                left: 0;
            }
            .header-bottom .main-nav .menu > li.active > a,
            .header-bottom .main-nav .menu > li:hover > a {
                color: #ff6b35 !important;
            }
        </style>
        <div class="header-bottom sticky-header d-none d-lg-block">
            <div class="container">
                <nav class="main-nav w-100">
                    <ul class="menu" th:with="path=${#httpServletRequest.requestURI}">
                        <li th:classappend="${path == '/'} ? 'active' : ''"><a href="/">Trang chủ</a></li>
                        <li th:classappend="${#strings.startsWith(path, '/san-pham')} ? 'active' : ''"><a href="/san-pham">Sản phẩm</a></li>
                        <li th:classappend="${#strings.startsWith(path, '/lien-he')} ? 'active' : ''"><a href="/lien-he" class="px-4">Liên hệ</a></li>
                        <li th:classappend="${#strings.startsWith(path, '/tin-tuc')} ? 'active' : ''"><a href="/tin-tuc">Tin tức</a></li>
                        <li th:classappend="${#strings.startsWith(path, '/doi-hang')} ? 'active' : ''"><a href="/doi-hang">Chính sách</a></li>
                        <li th:classappend="${#strings.startsWith(path, '/huong-dan')} ? 'active' : ''"><a href="/huong-dan">Hướng dẫn mua hàng</span></a></li>
                    </ul>
                </nav>
            </div><!-- End .container -->
        </div><!-- End .header-bottom -->
    </header><!-- End .header -->

    <script>
        (function() {
            $.ajax({
                url: '/api/cart/count',
                type: 'GET',
                success: function(data) {
                    if (data && data.count > 0) {
                        $('#cart-badge').text(data.count).show();
                    }
                }
            });
        })();
    </script>
</th:block>
