server.port=8081
# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/shoes?useUnicode=yes&characterEncoding=UTF-8&useSSL=false&createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345

# HIBERNATE
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.use-new-id-generator-mappings=false

# Hot reload template
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/

# JWT
jwt.secret=supersecret
jwt.duration=604800

#config upload file
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# VNPAY SANDBOX
# Dang ky merchant tai https://sandbox.vnpayment.vn de lay TmnCode + HashSecret rieng.
# Cac gia tri duoi day la placeholder demo, hay thay bang TmnCode/HashSecret cua ban.
vnpay.tmn-code=UFARMUW0
vnpay.hash-secret=IWFUMFVVEE5HNUPB6GDXX6IRLZAAY639
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.return-url=http://localhost:8081/payment/vnpay/return
vnpay.version=2.1.0
vnpay.command=pay
vnpay.curr-code=VND
vnpay.locale=vn

# GROQ CHATBOT
# Khong commit API key. Set bien moi truong GROQ_API_KEY truoc khi chay app.
# Lay API key mien phi tai https://console.groq.com/keys
groq.api-key=${GROQ_API_KEY:}
groq.api-url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile
groq.max-tokens=600
groq.temperature=0.5
